name: build

# Builds the clia.local desktop bundle (Tauri) on Linux and Windows. Runs `pnpm build`, which
# first prepares the bundled sidecars (RTK + the WinBox CLI) and then runs `tauri build`.
#
# WinBox is downloaded from the (private) winbox-gui release, so the build needs a token
# with read access to that repo. Set the `WINBOX_GH_TOKEN` repository secret to a PAT with
# `contents:read` on brunosps/winbox-gui. (If winbox-gui is made public, the default
# GITHUB_TOKEN is enough and no secret is needed.)

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-linux:
    name: linux (appimage + deb)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri/GTK system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            pkg-config \
            build-essential

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm (corepack)
        run: corepack enable

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install JS dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build desktop bundle
        env:
          # Lets winbox:prepare download the WinBox CLI from the private winbox-gui release.
          # Falls back to the default token (sufficient only if winbox-gui is public).
          GH_TOKEN: ${{ secrets.WINBOX_GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: corepack pnpm build

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clia-local-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: warn

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm

  build-windows:
    name: windows (msi + nsis)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm (corepack)
        run: corepack enable

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install JS dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build desktop bundle
        env:
          GH_TOKEN: ${{ secrets.WINBOX_GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: corepack pnpm build

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clia-local-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
