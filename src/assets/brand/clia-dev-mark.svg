<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" role="img" aria-labelledby="title desc">
  <title id="title">CLIA terminal mark</title>
  <desc id="desc">A terminal window mark with green and cyan command prompt accents.</desc>
  <defs>
    <linearGradient id="terminalFrame" x1="70" x2="490" y1="80" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#39ed75" />
      <stop offset="0.48" stop-color="#1cc9da" />
      <stop offset="1" stop-color="#5668e9" />
    </linearGradient>
    <linearGradient id="terminalGlass" x1="100" x2="460" y1="96" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38e8aa" stop-opacity="0.34" />
      <stop offset="0.62" stop-color="#1cbfdb" stop-opacity="0.19" />
      <stop offset="1" stop-color="#5966df" stop-opacity="0.14" />
    </linearGradient>
    <filter id="brandGlow" x="-30%" y="-35%" width="160%" height="170%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feColorMatrix
        in="blur"
        result="glow"
        type="matrix"
        values="0 0 0 0 0.18 0 0 0 0 0.9 0 0 0 0 0.72 0 0 0 0.55 0"
      />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#brandGlow)">
    <rect
      x="72"
      y="80"
      width="416"
      height="260"
      rx="38"
      fill="#1a252d"
      fill-opacity="0.62"
      stroke="url(#terminalFrame)"
      stroke-opacity="0.58"
      stroke-width="10"
    />
    <rect x="103" y="108" width="354" height="204" rx="22" fill="url(#terminalGlass)" />
    <path
      d="M180 151l78 78-78 78"
      fill="none"
      stroke="#56f0b0"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="28"
      stroke-opacity="0.72"
    />
    <rect x="305" y="263" width="48" height="20" rx="10" fill="#40ec70" fill-opacity="0.82" />
    <rect x="373" y="263" width="48" height="20" rx="10" fill="#26c8e0" fill-opacity="0.78" />
  </g>
</svg>
