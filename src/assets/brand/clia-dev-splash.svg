<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1420 440" role="img" aria-labelledby="title desc">
  <title id="title">CLIA wordmark</title>
  <desc id="desc">CLIA terminal mark and large CLIA wordmark with green, cyan, blue, and violet glow.</desc>
  <defs>
    <linearGradient id="wordGradient" x1="390" x2="1320" y1="110" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#41ef6e" />
      <stop offset="0.38" stop-color="#24d0d6" />
      <stop offset="0.68" stop-color="#4289f0" />
      <stop offset="1" stop-color="#7c50e2" />
    </linearGradient>
    <linearGradient id="markGradient" x1="90" x2="360" y1="90" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#41ef6e" />
      <stop offset="0.52" stop-color="#20c8d9" />
      <stop offset="1" stop-color="#586ce8" />
    </linearGradient>
    <linearGradient id="panelFill" x1="100" x2="350" y1="100" y2="310" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#45e7b4" stop-opacity="0.27" />
      <stop offset="0.6" stop-color="#22bdd7" stop-opacity="0.18" />
      <stop offset="1" stop-color="#5a66dc" stop-opacity="0.14" />
    </linearGradient>
    <filter id="softGlow" x="-14%" y="-45%" width="128%" height="190%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feColorMatrix
        in="blur"
        result="coloredBlur"
        type="matrix"
        values="0 0 0 0 0.08 0 0 0 0 0.86 0 0 0 0 0.72 0 0 0 0.48 0"
      />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="wordGlow" x="-10%" y="-35%" width="120%" height="170%">
      <feGaussianBlur stdDeviation="20" result="blur" />
      <feColorMatrix
        in="blur"
        result="coloredWordBlur"
        type="matrix"
        values="0 0 0 0 0.2 0 0 0 0 0.88 0 0 0 0 0.92 0 0 0 0.35 0"
      />
      <feMerge>
        <feMergeNode in="coloredWordBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#softGlow)">
    <rect
      x="84"
      y="95"
      width="286"
      height="230"
      rx="38"
      fill="#1a252d"
      fill-opacity="0.62"
      stroke="url(#markGradient)"
      stroke-opacity="0.5"
      stroke-width="9"
    />
    <rect x="111" y="120" width="232" height="178" rx="22" fill="url(#panelFill)" />
    <path
      d="M164 164l67 67-67 67"
      fill="none"
      stroke="#56f0b0"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="24"
      stroke-opacity="0.7"
    />
    <rect x="254" y="260" width="38" height="17" rx="8.5" fill="#40ec70" fill-opacity="0.82" />
    <rect x="309" y="260" width="38" height="17" rx="8.5" fill="#26c8e0" fill-opacity="0.76" />
  </g>
  <g filter="url(#wordGlow)">
    <text
      x="435"
      y="296"
      fill="url(#wordGradient)"
      font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
      font-size="238"
      font-weight="850"
      letter-spacing="0"
    >CLIA</text>
    <text
      x="1086"
      y="301"
      fill="#8ea0ff"
      fill-opacity="0.58"
      font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
      font-size="72"
      font-weight="750"
      letter-spacing="0"
    >.dev</text>
  </g>
</svg>
